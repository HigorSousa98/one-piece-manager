services:
  # ✅ PRODUÇÃO (com build)
  vue-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pirate-vue-app
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ✅ DESENVOLVIMENTO (modo dev)
  vue-app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: pirate-vue-app-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_DEV_SERVER_HOST=0.0.0.0
    volumes:
      - .:/app
      - /app/node_modules  # ✅ Preservar node_modules do container
      - /app/dist          # ✅ Preservar dist do container
    profiles:
      - dev
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"